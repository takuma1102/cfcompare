on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: R-CMD-check

concurrency:
  group: R-CMD-check-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RGL_USE_NULL: true
      # Treat suggested packages that we deliberately don't install in CI
      # (synthdid, gsynth, augsynth, did, fixest, ...) as a NOTE, not an error.
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Hard deps only (ggplot2/stats/utils + their deps); do NOT pull the
          # heavy optional engines. The few light Suggests that the check itself
          # needs (testthat, knitr, rmarkdown) are listed explicitly below.
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          # During development, fail only on hard errors. Tighten back to
          # '"warning"' (or remove this line) before any CRAN-style check.
          error-on: '"error"'
